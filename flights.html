<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTR3MD's - Flights</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    const loginTime = localStorage.getItem('loginTime');
    const isExpired = !loginTime || (Date.now() - parseInt(loginTime) > 12 * 60 * 60 * 1000);

    if (isExpired) {
        localStorage.removeItem('loginTime'); // ล้างทิ้ง
        window.location.href = 'index.html';
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; }
    .square-btn { aspect-ratio: 1 / 1; }
  </style>
</head>
<body class="bg-white min-h-screen flex flex-col">

  <nav aria-label="Breadcrumb" class="w-full px-4 py-2 border-b border-gray-100">
  <ol id="breadcrumb" class="flex items-center space-x-2" style="font-size: 6pt; color: #888; text-transform: uppercase;">
    </ol>
  </nav>

  <div class="w-full bg-[#333333] flex items-center justify-between px-4" style="height: 24px;">
    <span class="text-white" style="font-size: 6pt; letter-spacing: 0.5px;">FTR3MD's</span>
    <nav class="flex items-center space-x-3">
      <a href="index.html" class="text-white hover:text-gray-300" style="font-size: 6pt;">Home</a>
      <a href="flights.html" class="text-white hover:text-gray-300" style="font-size: 6pt;">Flights</a>
      <a href="#" class="text-white hover:text-gray-300" style="font-size: 6pt;">Schedule</a>
    </nav>
  </div>

  <nav class="w-full px-4 py-2 border-b border-gray-100" aria-label="Breadcrumb">
  <ol id="breadcrumb" class="flex items-center space-x-2" style="font-size: 6pt; color: #888; text-transform: uppercase;">
    </ol>
  </nav>

  <main class="flex-grow p-4">
    <div class="grid grid-cols-2 gap-4">
      <a href="all-flights.html" class="square-btn bg-[#333333] flex flex-col items-center justify-center text-white rounded-lg p-2 transition">
        <i data-lucide="list" class="w-8 h-8 mb-2"></i>
        <span style="font-size: 8pt;">All Flights</span>
      </a>
      <a href="international.html" class="square-btn bg-[#333333] flex flex-col items-center justify-center text-white rounded-lg p-2 transition">
        <i data-lucide="globe" class="w-8 h-8 mb-2"></i>
        <span style="font-size: 8pt;">International</span>
      </a>
      <a href="departures.html" class="square-btn bg-[#333333] flex flex-col items-center justify-center text-white rounded-lg p-2 transition">
        <i data-lucide="plane-takeoff" class="w-8 h-8 mb-2"></i>
        <span style="font-size: 8pt;">Departures</span>
      </a>
      <a href="arrivals.html" class="square-btn bg-[#333333] flex flex-col items-center justify-center text-white rounded-lg p-2 transition">
        <i data-lucide="plane-landing" class="w-8 h-8 mb-2"></i>
        <span style="font-size: 8pt;">Arrivals</span>
      </a>
    </div>
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
