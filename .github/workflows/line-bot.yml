name: Line Bot Daily Job
on:
  schedule:
    # รันทุกชั่วโมง ที่นาทีที่ 01
    - cron: '1 * * * *'
    
    # เพิ่มเวลาพิเศษ: 12.31, 13.31, 18.31, 19.31, 20.31, 21.31
    - cron: '31 12 * * *'
    - cron: '31 13 * * *'
    - cron: '31 18 * * *'
    - cron: '31 19 * * *'
    - cron: '31 20 * * *'
    - cron: '31 21 * * *'
    
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install requests
        run: pip install requests
      - name: Run Bot Script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          MY_USER_ID: ${{ secrets.MY_USER_ID }}
        run: python bot/main.py
