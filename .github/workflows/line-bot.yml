name: Line Bot Daily Job

on:
  schedule:
    # รันทุกชั่วโมง ที่นาทีที่ 01
    - cron: '1 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        # รวมการติดตั้งทุกอย่างไว้ที่นี่ทีเดียวครับ
        run: |
          pip install requests beautifulsoup4 pytz gspread oauth2client

      - name: Run Bot Script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          MY_USER_ID: ${{ secrets.MY_USER_ID }}
          # อย่าลืมใส่ตัวแปรที่ใช้เชื่อม Google Cloud เข้าไปด้วย
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python bot/main.py
