<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTR3MD's - International</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    
  <script src="https://cdn.tailwindcss.com"></script>    
  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="config.js" defer></script>
  <script src="api.js" defer></script>
  <script src="header.js" defer></script>
  <script src="main.js" defer></script>
  <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-white min-h-screen flex flex-col">

  <main id="flight-container" class="flex flex-col items-center p-4 space-y-4 w-full">
    <div id="loading" class="text-center mt-10 text-gray-500">กำลังโหลดข้อมูล...</div>
  </main>

  <script>
    const loginTime = localStorage.getItem('loginTime');
    const isExpired = !loginTime || (Date.now() - parseInt(loginTime) > 12 * 60 * 60 * 1000);

    if (isExpired) {
        localStorage.removeItem('loginTime'); // ล้างทิ้ง
        window.location.href = 'index.html';
    }
  </script>

    <script>
      const pageKey_Name = 'INTER_FLIGHTS';
    document.addEventListener('DOMContentLoaded', () => {
        injectHeader();            // ใส่ Header
        updateBreadcrumb();        // เติมข้อมูล Breadcrumb
        loadPageData(pageKey_Name);
    });

  // ฟังก์ชันนี้จะถูกเรียกโดย main.js หลังจากดึงและ Map ข้อมูลเรียบร้อย
    window.displayFlights = function(mappedFlights, pageKey_Name) {
        const container = document.getElementById('test-output');
        
        // เช็คว่ามีข้อมูลไหม
        if (mappedFlights.length === 0) {
            container.innerHTML = "ไม่พบข้อมูลเที่ยวบิน";
            return;
        }

        // เลือกเฉพาะตัวแรก (Index 0)
        const firstFlight = mappedFlights[0];

        // สร้าง HTML แสดงผล (ตัวอย่างสำหรับโหมด INTER_FLIGHTS)
        container.innerHTML = `
            <div class="border p-4 rounded shadow-md">
                <h3 class="font-bold text-xl mb-2">ข้อมูลไฟลท์แรก (${pageKey_Name})</h3>
                <p><strong>วันที่:</strong> ${firstFlight.date}</p>
                <p><strong>เวลาบิน:</strong> ${firstFlight.timeFly}</p>
                <p><strong>เวลาแลนด์:</strong> ${firstFlight.timeLand}</p>
                <p><strong>สนามบินต้นทาง:</strong> ${firstFlight.origin || 'N/A'}</p>
                <p><strong>สนามบินปลายทาง:</strong> ${firstFlight.destination || 'N/A'}</p>
                <p><strong>สายการบิน:</strong> ${firstFlight.airline || 'N/A'}</p>
                <p><strong>รหัสไฟลท์:</strong> ${firstFlight.code || 'N/A'}</p>
                <hr class="my-2">
                <p class="text-sm text-gray-500">หมายเหตุ: ${firstFlight.note || '-'}</p>
            </div>
    };
  </script>

</body>
</html>
