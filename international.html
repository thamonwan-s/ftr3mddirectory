<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTR3MD's - International</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    
  <script src="https://cdn.tailwindcss.com"></script>    
  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="config.js" defer></script>
  <script src="api.js" defer></script>
  <script src="header.js" defer></script>
  <script src="main.js" defer></script>
  <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-white min-h-screen flex flex-col">

  <div class="flex border-b border-gray-200 w-full max-w-4xl mx-auto">
    <button id="tab-year" class="px-6 py-3 font-medium text-blue-600 border-b-2 border-blue-600 focus:outline-none" onclick="switchTab('year')">
        จัดกลุ่มตามปี
    </button>
    <button id="tab-country" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700 focus:outline-none" onclick="switchTab('country')">
        จัดกลุ่มตามประเทศ
    </button>
</div>

<div id="flight-container" class="flex flex-col items-center p-4 space-y-4 w-full">
    </div>

  <main id="flight-container" class="flex flex-col items-center p-4 space-y-4 w-full">
    <div id="loading" class="text-center mt-10 text-gray-500">กำลังโหลดข้อมูล...</div>
  </main>

  <script>
    const loginTime = localStorage.getItem('loginTime');
    const isExpired = !loginTime || (Date.now() - parseInt(loginTime) > 12 * 60 * 60 * 1000);

    if (isExpired) {
        localStorage.removeItem('loginTime'); // ล้างทิ้ง
        window.location.href = 'index.html';
    }
  </script>

    <script>
      const pageKey_Name = 'INTER_FLIGHTS';
    document.addEventListener('DOMContentLoaded', () => {
        injectHeader();            // ใส่ Header
        updateBreadcrumb();        // เติมข้อมูล Breadcrumb
        loadPageData(pageKey_Name);
    });

    function switchTab(type) {
    // 1. จัดการ UI ของปุ่ม
        const tabYear = document.getElementById('tab-year');
        const tabCountry = document.getElementById('tab-country');
        
        if (type === 'year') {
            tabYear.className = "px-6 py-3 font-medium text-blue-600 border-b-2 border-blue-600";
            tabCountry.className = "px-6 py-3 font-medium text-gray-500 hover:text-gray-700";
            flightContainer.innerHTML = '';
            renderSortFlight(globalData, 'year'); // ฟังก์ชันที่คุณมีอยู่แล้ว
        } else {
            tabCountry.className = "px-6 py-3 font-medium text-blue-600 border-b-2 border-blue-600";
            tabYear.className = "px-6 py-3 font-medium text-gray-500 hover:text-gray-700";
            flightContainer.innerHTML = '';
            renderCountryFlight(globalData); // ฟังก์ชันใหม่ที่คุณจะอธิบาย
        }
    }

    function renderCountryFlight(data) {
      console.log("ข้อมูลที่ได้จาก Render (Raw):", data);
    }


  </script>

</body>
</html>
