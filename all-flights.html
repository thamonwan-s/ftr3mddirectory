<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Flights</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap'); body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-100 pb-10">

  <nav class="bg-blue-800 text-white p-4 shadow-lg">
    <h1 class="font-bold text-lg">All Flights</h1>
  </nav>

  <main id="flight-container" class="max-w-md mx-auto p-4 space-y-4">
    <div id="loading" class="text-center mt-10 text-gray-500">กำลังโหลดข้อมูล...</div>
  </main>

  <script>
    const url = 'https://script.google.com/macros/s/AKfycbzzF2n4723EcKe6Gup6JblQCNwhN98R0QZivr84VxFqCCR_vWJ2QdD6TkTX6DCzt9wEKA/exec';

    fetch(url)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        const container = document.getElementById('flight-container');
        const currentYear = new Date().getFullYear().toString();

        for (let setIdx = 4; setIdx < 200; setIdx += 9) {
          if (!data[0] || !data[0][setIdx]) continue;
          
          const year = data[0][setIdx].toString();
          const isExpanded = (year === currentYear);

          container.innerHTML += `
            <div class="border rounded-lg overflow-hidden bg-white shadow-sm">
              <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="w-full p-4 bg-gray-50 font-bold text-left flex justify-between border-b">
                ${year} <span>${isExpanded ? '▼' : '▲'}</span>
              </button>
              <div class="${isExpanded ? '' : 'hidden'} p-4">
                ${renderRows(data, setIdx)}
              </div>
            </div>`;
        }
      });

    function renderRows(data, setIdx) {
      let html = '';
      for (let rowIdx = 3; rowIdx < 500; rowIdx += 4) {
        if (!data[rowIdx] || !data[rowIdx][setIdx]) break;
        
        // นี่คือจุดที่คุณต้องแก้เลข + ถ้าข้อมูลผิดช่อง!
        let dateVal = data[rowIdx][setIdx]; 
        let origin = data[rowIdx+2][setIdx+3]; 
        let destination = data[rowIdx+2][setIdx+4];

        html += `
          <div class="border-b py-3 last:border-b-0">
            <div class="text-[10px] text-gray-400">${new Date(dateVal).toLocaleDateString('th-TH')}</div>
            <div class="flex justify-between items-center text-lg font-bold">
              <span>${origin || '---'}</span>
              <span class="text-gray-400 text-sm">✈</span>
              <span>${destination || '---'}</span>
            </div>
          </div>`;
      }
      return html;
    }
  </script>
</body>
</html>
