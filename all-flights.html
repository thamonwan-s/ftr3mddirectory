<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Flights</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>body { font-family: 'Kanit', sans-serif; background-color: #f9fafb; }</style>
</head>
<body class="pb-10">
  <main id="flight-container" class="max-w-md mx-auto p-4 space-y-6">
    <div id="loading" class="text-center mt-10 text-gray-500">กำลังโหลดข้อมูล...</div>
  </main>

  <script>
    const url = 'https://script.google.com/macros/s/AKfycbzzF2n4723EcKe6Gup6JblQCNwhN98R0QZivr84VxFqCCR_vWJ2QdD6TkTX6DCzt9wEKA/exec';

    fetch(url)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        const container = document.getElementById('flight-container');

        // วนลูปเซ็ตข้อมูล (E, N, W... คอลัมน์ที่ 4, 13, 22...)
        for (let setIdx = 4; setIdx < 200; setIdx += 9) {
          if (!data[0] || !data[0][setIdx]) continue;

          // แสดงปีค.ศ.
          container.innerHTML += `<h2 class="text-lg font-bold text-[#333333] border-b-2 border-[#333333] pb-1 mt-4">${data[0][setIdx]}</h2>`;

          // วนลูปข้อมูลในเซ็ต (แถวที่ 4-7, 8-11...)
          for (let rowIdx = 3; rowIdx < 500; rowIdx += 4) {
            if (!data[rowIdx] || !data[rowIdx][setIdx]) break;

            container.innerHTML += `
              <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <div class="text-xs text-gray-500 mb-2">${data[rowIdx][setIdx] || ''}</div>
                <div class="flex justify-between items-center text-lg font-bold">
                  <span>${data[rowIdx][setIdx+2] || ''}</span>
                  <i data-lucide="arrow-right" class="w-4 h-4"></i>
                  <span>${data[rowIdx][setIdx+3] || ''}</span>
                </div>
                <div class="text-[10px] text-gray-400 mt-1">${data[rowIdx+1][setIdx+2] || ''} → ${data[rowIdx+1][setIdx+3] || ''}</div>
              </div>
            `;
          }
        }
        lucide.createIcons();
      })
      .catch(err => {
        document.getElementById('loading').innerHTML = "เกิดข้อผิดพลาดในการโหลด: " + err;
      });
  </script>
</body>
</html>
