<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Flights</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="pb-10">

  <nav class="bg-[#333333] text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
    <div class="font-bold text-sm">ftr3md's</div>
    <div class="font-bold text-lg absolute left-1/2 transform -translate-x-1/2">All Flights</div>
    <div class="text-sm font-light">
      <a href="index.html" class="hover:text-gray-300">Home</a>
    </div>
  </nav>

  <main id="flight-container" class="max-w-md mx-auto p-4 space-y-4">
    <div id="loading" class="text-center mt-10 text-gray-500">กำลังโหลดข้อมูล...</div>
  </main>

  <script>
    const url = 'https://script.google.com/macros/s/AKfycbzzF2n4723EcKe6Gup6JblQCNwhN98R0QZivr84VxFqCCR_vWJ2QdD6TkTX6DCzt9wEKA/exec';

    fetch(url)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        const container = document.getElementById('flight-container');
        const currentYear = new Date().getFullYear().toString();

        for (let setIdx = 4; setIdx < 200; setIdx += 9) {
          if (!data[0] || !data[0][setIdx]) continue;
          const year = data[0][setIdx].toString();
          const isExpanded = (year === currentYear);

          container.innerHTML += `
            <div class="year-section">
              <button onclick="toggleYear(this)" class="w-full flex justify-between items-center text-lg font-bold text-[#333333] border-b-2 border-[#333333] pb-1 mt-6 mb-2">
                ${year} <span class="arrow">${isExpanded ? '▼' : '▲'}</span>
              </button>
              <div class="content ${isExpanded ? '' : 'hidden'} space-y-4">${renderFlights(data, setIdx)}</div>
            </div>`;
        }
      });

    function toggleYear(btn) {
      const content = btn.nextElementSibling;
      content.classList.toggle('hidden');
      btn.querySelector('.arrow').innerText = content.classList.contains('hidden') ? '▲' : '▼';
    }

    function renderFlights(data, setIdx) {
      let html = '';
      for (let rowIdx = 3; rowIdx < 500; rowIdx += 4) {
        if (!data[rowIdx] || !data[rowIdx][setIdx]) break;
        
        // จัดการวันที่: เพิ่มช่องว่างระหว่าง Day และ Date
        const d = new Date(data[rowIdx][setIdx]);
        const dayName = d.toLocaleDateString('en-US', {weekday: 'short'}).toUpperCase();
        const dayNum = d.getDate();
        const month = d.toLocaleDateString('en-US', {month: 'short'}).toUpperCase();
        
        // Logic ไอคอนสถานะและข้อความ
        const h4 = data[rowIdx][setIdx+3] === true;
        const i4 = data[rowIdx][setIdx+4] === true;
        let statusIcon = h4 && i4 ? '🛄' : h4 ? '🛫' : i4 ? '🛬' : '⛔';
        let statusText = data[rowIdx+1][setIdx+5] || ''; // J5: ข้อความสถานะ
        let meetingPoint = data[rowIdx+3][setIdx+5] || ''; // J7: สถานที่พบ

        // ฟังก์ชันแปลงเวลา HH:MM
        const formatTime = (val) => val ? val.toString().split(':').slice(0,2).join(':') : '--:--';

        html += `
          <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <div class="text-sm font-semibold text-gray-700 mb-3 space-x-2">
              <span class="text-[10px] text-gray-400 bg-gray-100 px-1 rounded">${dayName}</span> 
              <span>${dayNum} ${month}</span>
            </div>
            
            <div class="text-sm font-bold mb-2 flex items-center">
              <img src="https://logo.clearbit.com/${data[rowIdx][setIdx+7].toLowerCase().replace(/\s/g, '')}.com" class="w-5 h-5 mr-2" onerror="this.style.display='none'"> 
              ${data[rowIdx][setIdx+5]} ${data[rowIdx][setIdx+6]}
            </div>

            <div class="flex justify-between items-center text-2xl font-black text-[#333333] my-4">
              <div class="text-center">
                <div>${data[rowIdx+2][setIdx+3]}</div>
                <div class="text-[12px] font-normal text-gray-500">${formatTime(data[rowIdx+1][setIdx+3])}</div>
              </div>
              <div class="text-gray-400 text-lg">✈️ —————→</div>
              <div class="text-center">
                <div>${data[rowIdx+2][setIdx+4]}</div>
                <div class="text-[12px] font-normal text-gray-500">${formatTime(data[rowIdx+1][setIdx+4])}</div>
              </div>
            </div>

            <div class="pt-3 border-t text-[11px] text-blue-800 font-bold">
              ${statusIcon} ${statusText} : ${meetingPoint}
            </div>
          </div>`;
      }
      return html;
    }
  </script>
</body>
</html>
