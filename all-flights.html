<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTR3MD's - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-white min-h-screen flex flex-col">

  <div class="w-full bg-[#333333] flex items-center justify-between px-4" style="height: 24px;">
    <span class="text-white" style="font-size: 6pt; letter-spacing: 0.5px;">FTR3MD's</span>
    <nav class="flex items-center space-x-3">
      <a href="index.html" class="text-white hover:text-gray-300" style="font-size: 6pt;">Home</a>
      <a href="flights.html" class="text-white hover:text-gray-300" style="font-size: 6pt;">Flights</a>
      <a href="#" class="text-white hover:text-gray-300" style="font-size: 6pt;">Schedule</a>
    </nav>
  </div>

  <main id="flight-container" class="flex flex-col items-center p-4 space-y-4 w-full">
    <div id="loading" class="text-center mt-10 text-gray-500">กำลังโหลดข้อมูล...</div>
  </main>

  <script>
    const url = 'https://script.google.com/macros/s/AKfycbzzF2n4723EcKe6Gup6JblQCNwhN98R0QZivr84VxFqCCR_vWJ2QdD6TkTX6DCzt9wEKA/exec';

    const formatTime = (val) => {
      if (!val) return '--:--';
      const date = new Date(val);
      if (isNaN(date.getTime())) return val.toString().substring(0, 5);
      const h = date.getHours().toString().padStart(2, '0');
      const m = date.getMinutes().toString().padStart(2, '0');
      return `${h}:${m}`;
    };

    fetch(url)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        const container = document.getElementById('flight-container');
        const currentYear = new Date().getFullYear().toString();

        for (let setIdx = 4; setIdx < 200; setIdx += 9) {
          if (!data[0] || !data[0][setIdx]) continue;
          const year = data[0][setIdx].toString();
          const isExpanded = (year === currentYear);

          container.innerHTML += `
            <div class="year-section w-full max-w-sm">
              <button onclick="toggleYear(this)" class="w-full flex justify-between items-center text-lg font-bold text-[#333333] border-b-2 border-[#333333] pb-1 mt-6 mb-2">
                ${year} <span class="arrow">${isExpanded ? '▾' : '◂'}</span>
              </button>
              <div class="content ${isExpanded ? 'block' : 'hidden'} w-full space-y-4">${renderFlights(data, setIdx)}</div>
            </div>`;
        }
      });

    function toggleYear(btn) {
      const content = btn.nextElementSibling;
      content.classList.toggle('hidden');
      content.classList.toggle('block');
      btn.querySelector('.arrow').innerText = content.classList.contains('hidden') ? '◂' : '▾';
    }

    function renderFlights(data, setIdx) {
      let html = '';
      for (let rowIdx = 3; rowIdx < 500; rowIdx += 4) {
        if (!data[rowIdx] || !data[rowIdx][setIdx]) break;
        
        const d = new Date(data[rowIdx][setIdx]);
        const dayName = d.toLocaleDateString('en-US', {weekday: 'short'}).toUpperCase();
        const dayNum = d.getDate();
        const month = d.toLocaleDateString('en-US', {month: 'short'}).toUpperCase();
        
        const h4 = data[rowIdx][setIdx+3] === true;
        const i4 = data[rowIdx][setIdx+4] === true;
        const statusIcon = h4 && i4 ? '🛄' : h4 ? '🛫' : i4 ? '🛬' : '⛔';
        const showMeeting = (h4 || i4);
        
        // ตัดรหัสสายการบิน, ลบช่องว่าง, และแปลงเป็นตัวพิมพ์เล็ก
        const flightRaw = String(data[rowIdx][setIdx+5] || '');
        const flightCode = flightRaw.trim().split(' ')[0].toLowerCase(); 
        
        // เพิ่มเงื่อนไขเช็คว่าถ้าไม่มี flightCode ไม่ต้องเจน URL เพื่อไม่ให้รูปโหลดมั่ว
        const logoUrl = flightCode ? `https://edge.wego.com/image/upload/flights/airlines_square/${flightCode}` : '';
        
        const j5 = data[rowIdx+1][setIdx+5] || '';
        const j6 = data[rowIdx+2][setIdx+5] || '';
        const j7 = data[rowIdx+3][setIdx+5] || '';
        const bottomText = showMeeting ? `${j5} ${j6} : ${j7}` : `${j5} ${j6}`;

        html += `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 w-full max-w-sm mx-auto"> 
            <div class="flex items-center space-x-2 mb-4">
              <span class="text-[10px] text-gray-400 font-bold bg-gray-100 px-2 py-0.5 rounded">${dayName}</span> 
              <span class="text-sm font-semibold text-gray-700">${dayNum} ${month}</span>
            </div>
            
            <div class="text-sm font-bold mb-4 flex items-center">
              <img src="${logoUrl}" class="w-8 h-8 mr-3 border rounded-sm bg-gray-200"> 
              <span>${data[rowIdx][setIdx+5]} ${data[rowIdx][setIdx+6]} - ${data[rowIdx][setIdx+7] || ''}</span>
            </div>

            <div class="flex justify-between items-center text-2xl sm:text-3xl font-black text-[#333333] my-4">
              <div class="text-center">
                <div>${data[rowIdx+2][setIdx+3]}</div>
                <div class="text-lg font-bold text-gray-800">${formatTime(data[rowIdx+1][setIdx+3])}</div>
                <div class="text-xs text-gray-500">${data[rowIdx+3][setIdx+3] || ''}</div>
              </div>
              
              <div class="text-gray-400 text-lg">→</div>
              
              <div class="text-center">
                <div>${data[rowIdx+2][setIdx+4]}</div>
                <div class="text-lg font-bold text-gray-800">${formatTime(data[rowIdx+1][setIdx+4])}</div>
                <div class="text-xs text-gray-500">${data[rowIdx+3][setIdx+4] || ''}</div>
              </div>
            </div>

            <div class="pt-4 border-t text-[11px] text-blue-800 font-bold">
              ${statusIcon} ${bottomText}
            </div>
          </div>`;
      }
      return html;
    }
  </script>
</body>
</html>
