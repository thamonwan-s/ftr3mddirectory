<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTR3MD's - Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    
  <script src="https://cdn.tailwindcss.com"></script>    
  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="config.js" defer></script>
  <script src="api.js" defer></script>
  <script src="header.js" defer></script>
  <script src="main.js" defer></script>
  <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-white min-h-screen flex flex-col">

  <main id="flight-container" class="flex flex-col items-center p-4 space-y-4 w-full">
    <div id="loading" class="text-center mt-10 text-gray-500">กำลังโหลดข้อมูล...</div>
  </main>

  <script>
    const loginTime = localStorage.getItem('loginTime');
    const isExpired = !loginTime || (Date.now() - parseInt(loginTime) > 12 * 60 * 60 * 1000);

    if (isExpired) {
        localStorage.removeItem('loginTime'); // ล้างทิ้ง
        window.location.href = 'index.html';
    }
  </script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        injectHeader();            // ใส่ Header
        updateBreadcrumb();        // เติมข้อมูล Breadcrumb
        await loadPageData('ALL_FLIGHTS'); // ดึงข้อมูลมาแสดง (ฟังก์ชันใหม่ใน main.js)

        (async () => {
            console.log("กำลังโหลดข้อมูลเบื้องหลัง...");
            window.flightData = await fetchFlights('ALL_FLIGHTS');
            console.log("โหลดข้อมูลเบื้องหลังเสร็จแล้ว");
            
            // ส่ง Event ออกไปบอกว่าข้อมูลพร้อมแล้ว
            window.dispatchEvent(new CustomEvent('dataReady'));
        })();
    });

  </script>

  <script>
    function toggleYear(btn) {
      const content = btn.nextElementSibling;
      content.classList.toggle('hidden');
      content.classList.toggle('block');
      btn.querySelector('.arrow').innerText = content.classList.contains('hidden') ? '◂' : '▾';
    }

    // อัปเดตเลขปี/เดือน ตามส่วนที่อยู่กลางจอ
// แทนที่ Observer เดิมด้วยชุดนี้ครับ
    const observerOptions = {
      root: null,
      threshold: 0.6 
    };

    async function loadAndToggleYear(button, year) {
      // Toggle แสดง/ซ่อน (ฟังก์ชัน toggleYear เดิมของคุณ)
      toggleYear(button);
      const contentDiv = button.nextElementSibling;
      
      // 3. เช็คว่าถ้าข้อมูลยังไม่มา และเป็นสถานะ "ยังไม่ได้โหลด"
      if (!window.flightData && button.getAttribute('data-loaded') !== 'true') {
          contentDiv.innerHTML = `<div class="p-4 text-center text-gray-500">กำลังโหลดข้อมูล...</div>`;
          
          // รอข้อมูลจาก background
          await new Promise(resolve => window.addEventListener('dataReady', resolve, { once: true }));
          
          // ล้างคำว่า "กำลังโหลด" ออกก่อนเริ่ม render ข้อมูลจริง
          contentDiv.innerHTML = ""; 
      }
      const isLoaded = button.getAttribute('data-loaded') === 'true';
  
      // ถ้ายังไม่เคยโหลดข้อมูล ให้โหลดตอนนี้
      if (!isLoaded) {
          contentDiv.innerHTML = renderFlights(window.flightData, year); // เรียกใช้ฟังก์ชันเดิมของคุณ
          button.setAttribute('data-loaded', 'true');
      }
  }
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const year = entry.target.id.replace('year-', '');
          const navYear = document.getElementById('nav-year');
          if (navYear) navYear.innerText = year;
          
          // ดึงวันที่แรกที่เจอในกล่องนั้นมาแสดงเดือน
          const firstDate = entry.target.querySelector('.text-sm.font-semibold');
          if (firstDate) {
            const monthText = firstDate.innerText.split(' ')[1] || '-';
            const navMonth = document.getElementById('nav-month');
            if (navMonth) navMonth.innerText = monthText;
          }
        }
      });
    }, observerOptions);
    
    // เริ่มจับตาดูทุกปี
    setTimeout(() => {
      document.querySelectorAll('.year-section').forEach(section => observer.observe(section));
    }, 1000);
    
    // ฟังก์ชันกดปุ่มปี (เลื่อนไปปีนั้น)
    function scrollToYear() {
      const currentYear = document.getElementById('nav-year').innerText;
      alert("ฟังก์ชันเลือกปี: คุณสามารถเปลี่ยนเป็น Modal หรือ Dropdown ได้ที่นี่");
    }

    function jumpToSection(id) {
      if (id) {
        const element = document.getElementById(id);
        element.scrollIntoView({ behavior: 'smooth' });
      }
    }
  </script>
</body>
</html>
