<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Flights</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>body { font-family: 'Kanit', sans-serif; background-color: #f9fafb; }</style>
</head>
<body class="pb-10">

  <nav class="bg-[#333333] text-white p-4 shadow-md sticky top-0 z-10">
    <h1 class="font-bold text-lg">All Flights</h1>
  </nav>

  <main id="flight-container" class="max-w-md mx-auto p-4 space-y-4">
    <div id="loading" class="text-center mt-10 text-gray-500">กำลังโหลดข้อมูล...</div>
  </main>

  <script>
    const url = 'https://script.google.com/macros/s/AKfycbzzF2n4723EcKe6Gup6JblQCNwhN98R0QZivr84VxFqCCR_vWJ2QdD6TkTX6DCzt9wEKA/exec';

    fetch(url)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        const container = document.getElementById('flight-container');
        const currentYear = new Date().getFullYear().toString();

        for (let setIdx = 4; setIdx < 200; setIdx += 9) {
          if (!data[0] || !data[0][setIdx]) continue;
          
          const year = data[0][setIdx].toString();
          const isExpanded = (year === currentYear);

          container.innerHTML += `
            <div class="year-section">
              <button onclick="toggleYear(this)" class="w-full flex justify-between items-center text-lg font-bold text-[#333333] border-b-2 border-[#333333] pb-1 mt-6 mb-2">
                ${year} <span class="arrow">${isExpanded ? '▼' : '▲'}</span>
              </button>
              <div class="content ${isExpanded ? '' : 'hidden'} space-y-4">
                ${renderFlights(data, setIdx)}
              </div>
            </div>`;
        }
      });

    function toggleYear(btn) {
      const content = btn.nextElementSibling;
      content.classList.toggle('hidden');
      btn.querySelector('.arrow').innerText = content.classList.contains('hidden') ? '▲' : '▼';
    }

    function renderFlights(data, setIdx) {
      let html = '';
      for (let rowIdx = 3; rowIdx < 500; rowIdx += 4) {
        if (!data[rowIdx] || !data[rowIdx][setIdx]) break;
        
        // ดึงวันที่ (ตัดเวลาออก)
        let dateVal = data[rowIdx][setIdx] ? data[rowIdx][setIdx].toString().split('T')[0] : '';
        
        // ตรงนี้คือส่วนที่ดึงข้อมูลสนามบิน
        // ปรับเลข setIdx + X ตามตำแหน่งจริงใน Google Sheets ของคุณ
        let origin = data[rowIdx + 2][setIdx + 3] || '---'; 
        let dest = data[rowIdx + 2][setIdx + 4] || '---';

        html += `
          <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <div class="text-xs text-gray-400 mb-2">${dateVal}</div>
            <div class="flex justify-between items-center text-lg font-bold text-[#333333]">
              <span>${origin}</span>
              <span class="text-gray-400 text-sm">→</span>
              <span>${dest}</span>
            </div>
            <div class="text-[10px] text-gray-400 mt-1">
              ${data[rowIdx + 1][setIdx + 3] || ''} → ${data[rowIdx + 1][setIdx + 4] || ''}
            </div>
          </div>`;
      }
      return html;
    }
  </script>
</body>
</html>
