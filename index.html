<!DOCTYPE html>
<html>
<head>
  <style>
  body { font-family: sans-serif; margin: 0; padding: 10px; }
  
  /* เพิ่มส่วนนี้เพื่อให้ตารางปรับตัวได้ */
  .table-responsive {
    width: 100%;
    overflow-x: auto; /* ให้เลื่อนเฉพาะตัวตารางได้หากจำเป็น */
    -webkit-overflow-scrolling: touch;
  }
  
  table { 
    width: 100%; 
    border-collapse: collapse; 
    min-width: 600px; /* ป้องกันตารางบีบจนอ่านไม่ได้ */
  }
  
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background: #f2f2f2; }
</style>
</head>
<body>
  <div id="table-container">กำลังโหลดข้อมูล...</div>
  <script>
    // แทนที่ URL ด้วย Web App URL ของคุณที่ลงท้ายด้วย /exec
    const url = 'https://script.google.com/macros/s/AKfycbzzF2n4723EcKe6Gup6JblQCNwhN98R0QZivr84VxFqCCR_vWJ2QdD6TkTX6DCzt9wEKA/exec'; 
    
    fetch(url)
      .then(res => res.json())
      .then(data => {
        let html = '<table>';
        data.forEach((row, i) => {
          html += '<tr>' + row.map(cell => (i === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`)).join('') + '</tr>';
        });
        html += '</table>';
        document.getElementById('table-container').innerHTML = html;
      });
  </script>
</body>
</html>
