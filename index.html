<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTR3MD's - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Kanit', sans-serif; }</style>
  <script src="config.js"></script>
</head>
<body class="bg-white min-h-screen flex flex-col">

  <div class="w-full bg-[#333333] flex items-center justify-between px-4" style="height: 24px;">
    <span class="text-white" style="font-size: 6pt; letter-spacing: 0.5px;">FTR3MD's</span>
    <nav class="flex items-center space-x-3">
      <a href="index.html" class="text-white hover:text-gray-300" style="font-size: 6pt;">Home</a>
      <a href="flights.html" class="text-white hover:text-gray-300" style="font-size: 6pt;">Flights</a>
      <a href="#" class="text-white hover:text-gray-300" style="font-size: 6pt;">Schedule</a>
    </nav>
  </div>

  <main class="flex-grow flex flex-col items-center justify-center p-4">
    <p class="text-[#333333] mb-6" style="font-size: 8pt; text-transform: lowercase;">memories has been captured by ftr</p>
    
    <div id="login-form" class="w-full max-w-xs space-y-4">
      <input type="password" id="pass" placeholder="Password" 
             class="w-full border-b border-[#333333] text-center text-sm py-2 focus:outline-none">
      <p class="text-[7pt] text-gray-400 italic text-center">hint: สายตรงถึงน้องหมั่นโถว</p>
      <button onclick="checkPassword()" 
              class="w-full bg-[#333333] text-white text-[8pt] py-2 uppercase tracking-widest hover:opacity-80 transition-opacity">
        Enter
      </button>
    </div>

    <div id="logout-form" class="hidden text-center space-y-4">
      <p class="text-[8pt] text-gray-500">logged in successfully</p>
      <div id="countdown" class="text-[7pt] text-red-500 font-mono"></div>
      <button onclick="logout()" class="w-full border border-[#333333] text-[#333333] text-[8pt] py-2 uppercase tracking-widest hover:bg-gray-100">Logout</button>
    </div>
  </main>


  <script>
    const SESSION_DURATION = 12 * 60 * 60 * 1000; 

    document.addEventListener('DOMContentLoaded', () => {
        init();
    });

    function init() {
        const loginTime = localStorage.getItem('loginTime');
        if (loginTime) {
            const timePassed = Date.now() - parseInt(loginTime);
            if (timePassed < SESSION_DURATION) {
                showLogoutState();
                startCountdown(parseInt(loginTime) + SESSION_DURATION);
            } else {
                logout(); 
            }
        }
    }

function checkPassword() {
    const input = document.getElementById('pass').value;
    const url = `${SCRIPT_URL}?function=checkPassword&pass=${input}&callback=handleResponse`;

    // สร้างฟังก์ชันชั่วคราวเพื่อรับค่ากลับมา
    window.handleResponse = function(isCorrect) {
        if (isCorrect === true) {
            localStorage.setItem('loginTime', Date.now().toString());
            location.reload();
        } else {
            alert("Incorrect password");
        }
        document.body.removeChild(scriptTag);
    };

    // สร้าง script tag เพื่อเรียก URL (เลี่ยง CORS ได้สมบูรณ์)
    const scriptTag = document.createElement('script');
    scriptTag.src = `${SCRIPT_URL}?function=checkPassword&pass=${input}&callback=handleResponse`;
    document.body.appendChild(scriptTag);
}

    function showLogoutState() {
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('logout-form').classList.remove('hidden');
    }

    function logout() {
        localStorage.removeItem('loginTime');
        location.reload();
    }

    function startCountdown(endTime) {
        const timer = setInterval(() => {
            const distance = endTime - Date.now();
            const countdownEl = document.getElementById('countdown');
            if (distance < 0) { logout(); clearInterval(timer); return; }
            
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            if (countdownEl) countdownEl.innerText = `auto-logout in: ${hours}h ${minutes}m ${seconds}s`;
        }, 1000);
    }
  </script>
</body>
</html>
